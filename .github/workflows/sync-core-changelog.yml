name: Sync Core Changelog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CORE_CHANGELOG_URL: ${{ vars.CORE_CHANGELOG_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate changelog source config
        run: |
          if [ -z "$CORE_CHANGELOG_URL" ]; then
            echo "CORE_CHANGELOG_URL repo variable is not set."
            echo "Set it to the raw URL of packages/core/CHANGELOG.md."
            exit 1
          fi

      - name: Sync generated changelog data
        run: pnpm sync:changelog

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- "app/(pages)/changelog/data.generated.ts"; then
            echo "No changelog updates detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "app/(pages)/changelog/data.generated.ts"
          git commit -m "chore(changelog): sync core changelog"
          git push
